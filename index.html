<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Solar System</title>
    <link rel="stylesheet" href="animation-task-8.css" />
  </head>
  <body>

    <div class="star"></div>
    <div class="container">
      <div class="rings">
        <div id="planet" class="neptune"></div>
      </div>
      <div id="galaxy" class="satellite-1"></div>
      <div id="galaxy" class="satellite-2"></div>
      <div class="rings one"><div id="planet" class="uranus"></div></div>

      <div class="rings two">
        <div id="planet" class="saturn"><div class="wing"></div></div>
      </div>
      <div class="rings three">
        <div id="planet" class="jupitar"></div>
      </div>
      <div class="rings four"><div id="planet" class="mars"></div></div>
      <div class="rings five">
        <div id="planet" class="earth"></div>
        <div class="spin">
          <div id="spin" class="rock"></div>
        </div>
      </div>
      <div class="rings six"><div id="planet" class="venus"></div></div>
      <div class="rings seven"><div id="planet" class="mercury"></div></div>
      <div class="rings sun"></div>
    </div>
    </div>

  </body>
</html>
